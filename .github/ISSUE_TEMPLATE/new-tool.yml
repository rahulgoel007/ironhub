name: New tool
description: Propose a new WASM tool (a trunk that one or more skills will branch from).
title: "[tool] "
labels: ["type:tool", "status:proposed"]
body:
  - type: input
    id: name
    attributes:
      label: Tool name
      description: kebab-case, no `tool` suffix. The directory name will be `tools/<name>/` and the crate name will be `<name>-tool`.
      placeholder: linear
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author
      description: Legal name of the person claiming this work.
    validations:
      required: true
  - type: input
    id: summary
    attributes:
      label: One-sentence description
      placeholder: Linear issue tracking integration via the Linear GraphQL API.
    validations:
      required: true
  - type: textarea
    id: use_cases
    attributes:
      label: Target use cases
      description: List 2-3 concrete scenarios/use cases. One per line, prefixed with "- ".
      placeholder: |
        - Search and list active issues by assignee or status
        - Create and assign new engineering tasks in real-time
        - Query workspace and team-level metrics
    validations:
      required: true
  - type: textarea
    id: surface
    attributes:
      label: API surface to wrap
      description: List the operations the tool exposes. One per line.
      placeholder: |
        list_issues
        create_issue
        update_issue
        list_projects
    validations:
      required: true
  - type: dropdown
    id: auth
    attributes:
      label: Auth model
      options:
        - OAuth 2.0 user-context (PKCE)
        - OAuth 2.0 user-context (no PKCE)
        - Static API token
        - Static webhook URL
        - No auth
    validations:
      required: true
  - type: textarea
    id: scopes
    attributes:
      label: Required scopes or permissions
      description: Optional. List the OAuth scopes or API token permissions the tool needs.
  - type: textarea
    id: limits
    attributes:
      label: Known limits or constraints
      description: Rate limits, tenant restrictions, content size caps, regional availability, etc.
