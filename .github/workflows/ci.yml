name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # When adding a new tool crate, append its path here.
      matrix:
        crate:
          - tools/microsoft-365
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: Format check
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --check

      - name: Clippy (wasm target)
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --target wasm32-wasip2 --release -- -D warnings

      - name: Clippy (tests)
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --tests --release -- -D warnings

      - name: Tests
        working-directory: ${{ matrix.crate }}
        run: cargo test

      - name: Build wasm component
        working-directory: ${{ matrix.crate }}
        run: cargo build --release --target wasm32-wasip2
